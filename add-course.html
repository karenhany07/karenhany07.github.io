<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Course-organizer</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h1>Personal Course Organizer</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="my-courses.html">My Courses</a></li>
                    <li><a href="add-course.html">Add Course</a></li>
                    <li><a href="contact-us.html">Contact Us</a></li>
                </ul>
            </nav>

        </header>
        
        <div class="hero-section">
            <main>
                <section>
                    <caption>Add Courses</caption>
                    <form method="get">
                        <label for="cname">Course's Name</label>
                        <br>
                        <input type="text" id="cname" name="cname" placeholder="e.g. Programming 1" required>
                        <br>
                        <label for="instructor">Instructor</label>
                        <br>
                        <input type="text" id="instructor" name="instructor" placeholder="Enter doctor's name" required>
                        <br>
                        <label for="hours">Credit Hours</label>
                        <br>
                        <input type="number" id="hours" name="hours" placeholder="e.g. 3" required> 
                        <br>
                        <label for="notes">Notes</label>
                        <br>
                        <textarea id="notes" name="notes" placeholder="Write any extra notes here..."></textarea>
                        <br>
                        <button type="submit">Add to My List</button> 
                    </form>
                </section>
            </main>
        </div>
        <footer>
            <p>Designed by: <strong>Karen Hani</strong></p>
            <p>&copy; 2026 Personal Course Organizer - Individual Task</p>
        </footer>
    </body>
</html>
